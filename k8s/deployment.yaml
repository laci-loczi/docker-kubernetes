# k8s/deployment.yaml

# api deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-api-deployment
spec:
  replicas: 2 
  selector:
    matchLabels:
      app: backend-api
  template:
    metadata:
      labels:
        app: backend-api
    spec:
      containers:
      - name: node
        image: my-node-app:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
        env:
          - name: ROLE
            value: "api"
          - name: REDIS_HOST
            value: "redis-service"
          - name: ADMIN_PASSWORD 
            valueFrom:
              secretKeyRef:
                name: app-secrets
                key: ADMIN_PASSWORD 
        resources:
          requests:
            cpu: "100m"     
            memory: "128Mi"  
          limits:
            cpu: "500m"      
            memory: "512Mi"  
        readinessProbe:
          httpGet:
            path: /healthz
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /healthz
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 20

---
# api service
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  selector:
    app: backend-api
  ports:
    - port: 80
      targetPort: 3000

---
# api hpa
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-api-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend-api-deployment
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75

---
# worker deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-worker-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend-worker
  template:
    metadata:
      labels:
        app: backend-worker
    spec:
      containers:
      - name: node
        image: my-node-app:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3001
        env:
          - name: ROLE
            value: "worker"
          - name: REDIS_HOST
            value: "redis-service"
        resources:
          requests:
            cpu: "200m"     
            memory: "512Mi"  
          limits:
            cpu: "2000m"     
            memory: "2048Mi"  
        # worker lifecycle (split into Liveness and Readiness)
        startupProbe:
          httpGet:
            path: /healthz
            port: 3001
          failureThreshold: 30
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /healthz
            port: 3001
          periodSeconds: 20
        # only ready if the ai is warmed up
        readinessProbe:
          httpGet:
            path: /ready
            port: 3001
          initialDelaySeconds: 5
          periodSeconds: 10

---
# worker autoscaler (hpa)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-worker-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend-worker-deployment
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 85
  # behavior rules (don't scale up unnecessarily)
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 45 # wait 45 seconds after the spike before scaling
      policies:
      - type: Pods
        value: 2
        periodSeconds: 15

---

# nginx deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: nginx-config-vol
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
      volumes:
      - name: nginx-config-vol
        configMap:
          name: nginx-conf
---
# nginx service for port 80
apiVersion: v1
kind: Service
metadata:
  name: nginx-service
spec:
  selector:
    app: nginx
  ports:
    - port: 80
      targetPort: 80
  type: LoadBalancer

# redis deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:alpine
        ports:
        - containerPort: 6379

---
# redis service
apiVersion: v1
kind: Service
metadata:
  name: redis-service
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379